server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: easy-idea-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: easy-idea
          app: easy-idea-api
          __path__: /var/log/app/app.log
