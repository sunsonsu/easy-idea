version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easy-idea-api
    volumes:
      - ./src:/src
      - ./data:/src/data
    env_file: 
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - LOG_LEVEL=INFO
    ports:
      - "8080:8080"
    depends_on:
      - chromadb

  chromadb:
    image: chromadb/chroma:latest
    container_name: easy-idea-chromadb
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8000:8000"
    restart: unless-stopped

networks:
  default:
    name: easy-idea-network