<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Easy Idea{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .prose { max-width: 80ch; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .chat-bubble { white-space: pre-wrap; }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-indigo-400 hover:text-indigo-300 transition">💡 Easy Idea</a>
            <div class="flex gap-4 text-sm">
                <a href="/" class="px-3 py-1.5 rounded-lg hover:bg-gray-800 transition {% block nav_home %}{% endblock %}">🏠 Home</a>
                <a href="/ui/chat" class="px-3 py-1.5 rounded-lg hover:bg-gray-800 transition {% block nav_chat %}{% endblock %}">💬 Custom Prompt</a>
                <a href="/ui/docs-list" class="px-3 py-1.5 rounded-lg hover:bg-gray-800 transition {% block nav_docs %}{% endblock %}">📄 Knowledge Base</a>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center text-xs text-gray-600 py-4 border-t border-gray-800">
        Easy Idea RAG {{ version }}
    </footer>

    <!-- Shared JS -->
    <script>
        const ACCESS_TOKEN = localStorage.getItem('easy_idea_access_token') || '';

        function setApiKey() {
            const key = prompt('Enter your access_token:');
            if (key) {
                localStorage.setItem('easy_idea_access_token', key);
                location.reload();
            }
        }

        async function apiFetch(url, options = {}) {
            const key = localStorage.getItem('easy_idea_access_token');
            if (!key) {
                setApiKey();
                throw new Error('access_token required');
            }
            const res = await fetch(url, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'access_token': key,
                    ...(options.headers || {})
                }
            });
            if (res.status === 403) {
                alert('Invalid access_token. Please set a valid token.');
                setApiKey();
                throw new Error('Invalid access_token');
            }
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || `Request failed (${res.status})`);
            }
            return res.json();
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
