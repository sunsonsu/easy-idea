# Observability backends only — app runs on host.
# Usage:
#   docker compose -f docker-compose.observability.yml up -d
#   OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4317 python src/app/main.py

networks:
  easy-idea-observability:
    driver: bridge

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC (app → collector)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics endpoint
    networks:
      - easy-idea-observability

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger UI
      - "14317:4317"  # Jaeger OTLP gRPC (collector → jaeger, internal)
    networks:
      - easy-idea-observability

  prometheus:
    image: prom/prometheus:v3.0.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - easy-idea-observability

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    networks:
      - easy-idea-observability
    depends_on:
      - prometheus
      - jaeger
